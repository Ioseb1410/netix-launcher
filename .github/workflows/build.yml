name: Build Netix Shield
on: [workflow_dispatch]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Download Amnezia Base
        run: |
          git clone https://github.com
          cd amnezia-client-android
          echo "Branding Netix Shield..."

      - name: Build Android APK
        run: |
          cd amnezia-client-android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Netix-Shield-Android
          path: amnezia-client-android/app/build/outputs/apk/debug/*.apk
