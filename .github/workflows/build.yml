name: Build Netix Shield
on: [workflow_dispatch]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Netix App
        run: |
          mkdir -p android/app/outputs/apk/
          echo "Netix Shield v1.0 Build" > android/app/outputs/apk/netix_info.txt
          # აქ იწყება Windows-ის მომზადებაც
          echo "Windows Portable Version Ready" > netix_win.txt

      - name: Upload Netix Shield
        uses: actions/upload-artifact@v4
        with:
          name: Netix-Shield-Package
          path: |
            android/app/outputs/apk/
            netix_win.txt
