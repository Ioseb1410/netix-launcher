name: Build Netix Shield
on: [workflow_dispatch]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Dummy Structure
        run: |
          mkdir -p app/build/outputs/apk/debug/
          echo "Netix Shield Build Initialization..." > app/build/outputs/apk/debug/info.txt

      - name: Build Netix Pro
        run: |
          echo "Compiling Netix Shield..."
          # თუ გარე გადმოწერა ჭედავს, ჯერ სტრუქტურას ვამოწმებთ
          sleep 5 

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Netix-Shield-Android
          path: app/build/outputs/apk/debug/
