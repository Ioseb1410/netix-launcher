name: Build Netix Shield
on: [workflow_dispatch]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Android App
        run: |
          # ვიყენებთ Amnezia-ს მზა გარემოს
          git clone --depth 1 https://github.com
          cd amnezia-client-android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Netix-Shield-APK
          path: amnezia-client-android/app/build/outputs/apk/debug/*.apk
