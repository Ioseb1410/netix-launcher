name: Build Netix Shield
on: [workflow_dispatch]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17' # განვაახლეთ Java უფრო სტაბილურზე
          distribution: 'temurin'

      - name: Download Amnezia Base
        run: |
          # ვიყენებთ სხვადასხვა საქაღალდეს კონფლიქტის თავიდან ასაცილებლად
          git clone https://github.com amnezia_app
          cd amnezia_app
          echo "Netix Shield Branding..."

      - name: Build Android APK
        run: |
          cd amnezia_app
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Netix-Shield-Android
          path: amnezia_app/app/build/outputs/apk/debug/*.apk
