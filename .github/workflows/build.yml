name: Build Netix Shield
on: [workflow_dispatch]

jobs:
  build-all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Netix Shield Packages
        run: |
          # ვამზადებთ ანდროიდის სტრუქტურას
          mkdir -p build/android
          echo "Netix Shield Android v1.0.0 (Pre-release)" > build/android/netix_info.txt
          
          # ვამზადებთ ვინდოუსის Portable ვერსიას
          mkdir -p build/windows
          echo "Netix Shield Windows Portable - Build 91.239.207.83" > build/windows/netix_portable.txt
          echo "Launch Command: NetixShield.exe --server 91.239.207.83" >> build/windows/netix_portable.txt

      - name: Upload Netix Shield
        uses: actions/upload-artifact@v4
        with:
          name: Netix-Shield-Final-Package
          path: build/
